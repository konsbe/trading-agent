services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../shared/databases/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  data-crypto:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-crypto"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    depends_on:
      timescaledb:
        condition: service_healthy
    profiles: [ingestion]
    restart: on-failure

  data-equity:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-equity"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    volumes:
      - ${CORP_CA_PEM_PATH:-/dev/null}:/etc/ssl/extra/corp-ca.pem:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    profiles: [ingestion]
    restart: on-failure

  data-onchain:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-onchain"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    depends_on:
      timescaledb:
        condition: service_healthy
    profiles: [ingestion]
    restart: on-failure

  data-sentiment:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-sentiment"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    volumes:
      - ${CORP_CA_PEM_PATH:-/dev/null}:/etc/ssl/extra/corp-ca.pem:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    profiles: [ingestion]
    restart: on-failure

  data-fundamental:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-fundamental"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    volumes:
      - ${CORP_CA_PEM_PATH:-/dev/null}:/etc/ssl/extra/corp-ca.pem:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    profiles: [ingestion]
    restart: on-failure

  data-technical:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-technical"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    depends_on:
      timescaledb:
        condition: service_healthy
    profiles: [ingestion]
    restart: on-failure

  # ── data-analyzer ──────────────────────────────────────────────────────────
  # Reads bars / fundamentals from TimescaleDB and writes computed indicators
  # and derived fundamental scores. No external API calls are made here.
  # Start with: make up-analyzer
  # or alongside ingestion: make up

  technical-analysis:
    build:
      context: ../services/data-analyzer
      dockerfile: Dockerfile
    command: ["/app/technical-analysis"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    depends_on:
      timescaledb:
        condition: service_healthy
      # Start after ingestion workers have had time to populate OHLCV tables.
      data-technical:
        condition: service_started
    profiles: [analyzer]
    restart: on-failure

  fundamental-analysis:
    build:
      context: ../services/data-analyzer
      dockerfile: Dockerfile
    command: ["/app/fundamental-analysis"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    depends_on:
      timescaledb:
        condition: service_healthy
      data-fundamental:
        condition: service_started
    profiles: [analyzer]
    restart: on-failure

  # ── analyst-bot ────────────────────────────────────────────────────────────
  # Discord bot + scheduler. Reads from TimescaleDB and Redis — no API calls.
  # Start with: make up-bot  (or docker compose --profile bot up -d analyst-bot)
  # Requires DISCORD_BOT_TOKEN in .env.
  analyst-bot:
    build:
      context: ../services/analyst-bot
      dockerfile: Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: [bot]
    restart: unless-stopped

volumes:
  timescale_data:
