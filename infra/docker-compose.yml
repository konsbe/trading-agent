services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../shared/databases/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  data-crypto:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-crypto"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/trading?sslmode=disable
    depends_on:
      timescaledb:
        condition: service_healthy
    profiles: [ingestion]
    restart: on-failure

  data-equity:
    build:
      context: ../services/data-ingestion
      dockerfile: Dockerfile
    command: ["/app/data-equity"]
    env_file:
